---
layout: default
---

<article class="post">
  <header class="post-header">
    {% if page.category %}
      <p class="eyebrow">{{ page.category }}</p>
    {% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-description">{{ page.description }}</p>
    {% endif %}
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>
    </div>
    {% if page.image %}
      <img class="post-hero-image" src="{{ page.image | relative_url }}" alt="{{ page.title }} 대표 이미지">
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
